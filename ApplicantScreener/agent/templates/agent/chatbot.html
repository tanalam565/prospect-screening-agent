<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applicant Screener AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: #f0f2f5; }
        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            height: 85vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header {
            background: #1a1a2e;
            color: white;
            padding: 16px 20px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { display: flex; gap: 10px; align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .bubble.user {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .bubble.assistant {
            background: #f1f3f5;
            color: #212529;
            border-bottom-left-radius: 4px;
        }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .avatar.user { background: #0d6efd; color: white; }
        .avatar.assistant { background: #6c757d; color: white; }
        .chat-input {
            padding: 16px;
            border-top: 1px solid #dee2e6;
            background: white;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c757d;
            animation: bounce 1.2s infinite;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
        .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 12px; }
        .chip {
            background: #e9ecef;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chip:hover { background: #dee2e6; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
{% verbatim %}
const { useState, useRef, useEffect } = React;

const SUGGESTIONS = [
    "List all prospects",
    "Show prospects with high risk",
    "Screen prospect ID 1",
    "Who has credit score above 700?",
    "Screen John Smith",
    "Show denied prospects",
];

function TypingIndicator() {
    return (
        <div className="message">
            <div className="avatar assistant">AI</div>
            <div className="bubble assistant">
                <div className="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    );
}

function Message({ msg }) {
    return (
        <div className={`message ${msg.role}`}>
            <div className={`avatar ${msg.role}`}>
                {msg.role === "user" ? "You" : "AI"}
            </div>
            <div className={`bubble ${msg.role}`}>
                {msg.content}
            </div>
        </div>
    );
}

function Chatbot() {
    const [messages, setMessages] = useState([
        {
            role: "assistant",
            content: "Hi! I'm your AI screening assistant. I can help you:\n• Search and query prospect data\n• Run full agentic screening evaluations\n• Analyze credit, income, and identity\n\nWhat would you like to know?"
        }
    ]);
    const [input, setInput] = useState("");
    const [loading, setLoading] = useState(false);
    const bottomRef = useRef(null);

    useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
    }, [messages, loading]);

    const sendMessage = async (text) => {
        const userMessage = text || input.trim();
        if (!userMessage || loading) return;

        setInput("");
        setMessages(prev => [...prev, { role: "user", content: userMessage }]);
        setLoading(true);

        // Build chat history (exclude the initial greeting)
        const history = messages.slice(1).map(m => ({
            role: m.role,
            content: m.content
        }));

        try {
            const response = await fetch("/agents/api/chat/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: userMessage,
                    chat_history: history,
                }),
            });

            const data = await response.json();
            if (data.error) {
                setMessages(prev => [...prev, { role: "assistant", content: `Error: ${data.error}` }]);
            } else {
                setMessages(prev => [...prev, { role: "assistant", content: data.response }]);
            }
        } catch (err) {
            setMessages(prev => [...prev, { role: "assistant", content: "Connection error. Make sure the server is running." }]);
        } finally {
            setLoading(false);
        }
    };

    const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    };

    return (
        <div className="chat-container">
            <div className="chat-header">
                <h5 className="mb-0">🤖 Applicant Screener AI</h5>
                <small className="opacity-75">Multi-agent powered by AutoGen + Ollama</small>
            </div>

            <div className="chat-messages">
                {messages.map((msg, i) => <Message key={i} msg={msg} />)}
                {loading && <TypingIndicator />}
                <div ref={bottomRef} />
            </div>

            <div className="suggestion-chips">
                {SUGGESTIONS.map((s, i) => (
                    <button key={i} className="chip" onClick={() => sendMessage(s)}>{s}</button>
                ))}
            </div>

            <div className="chat-input">
                <div className="input-group">
                    <textarea
                        className="form-control"
                        rows="2"
                        placeholder="Ask about prospects or request a screening evaluation..."
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyDown={handleKeyDown}
                        disabled={loading}
                        style={{ resize: "none" }}
                    />
                    <button
                        className="btn btn-primary"
                        onClick={() => sendMessage()}
                        disabled={loading || !input.trim()}
                    >
                        {loading ? "..." : "Send"}
                    </button>
                </div>
                <small className="text-muted mt-1 d-block">Press Enter to send, Shift+Enter for new line</small>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Chatbot />);
{% endverbatim %}
</script>
</body>
</html>
